  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

3, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'VT323';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"24d53bf3-3675-4b7c-8911-e74218f6d554\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'VT323';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"a7e18cc9-e917-4344-9226-3a8f00794f7a\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  :root{\n    /* --- Midnight chamber surfaces (from theme.rs) --- */\n    --void:#0c0e16;\n    --void-2:#0a0b12;\n    --panel:#161924;\n    --panel-2:#10131c;\n    --pedestal:#2e3448;\n    --pedestal-face:#1c2030;\n    --speck-dim:#1c1f2e;\n    --speck-lit:#383e58;\n    --shadow:#08090f;\n    /* --- Lost Century accent ink --- */\n    --parchment:#d2c9a5;   /* TITLE   */\n    --gold:#b3a555;        /* STAT    */\n    --gold-bright:#d6c97a;\n    --sage:#8caba1;        /* CATALOG */\n    --bronze:#ba9158;      /* FRAME   */\n    --bronze-deep:#5c4226;\n    --copper:#c77b58;      /* SELECTED*/\n    --ember:#ae5d40;\n    --muted:#847875;       /* HINT    */\n    --olive:#4d4539;\n\n    --font-pixel:'Silkscreen', monospace;\n    --font-micro:'Press Start 2P', monospace;\n    --font-term:'VT323', monospace;\n  }\n\n  *{box-sizing:border-box;margin:0;padding:0;}\n  html,body{height:100%;width:100%;overflow:hidden;}\n  body{\n    background:var(--void);\n    color:var(--parchment);\n    font-family:var(--font-term);\n    -webkit-font-smoothing:none;\n    position:relative;\n  }\n  /* sprites (32px, upscaled) stay crisp-blocky; screenshots (downscaled) render smooth */\n  .tile img,.brand .mark img{image-rendering:pixelated;}\n  .shot img{image-rendering:auto;}\n\n  /* ===== Background: night chamber ===== */\n  .sky{position:fixed;inset:0;z-index:0;overflow:hidden;\n    background:\n      radial-gradient(120% 80% at 50% -12%, #1b2c4a 0%, rgba(27,44,74,0) 52%),\n      radial-gradient(120% 90% at 84% 116%, #2a1640 0%, rgba(42,22,64,0) 50%),\n      radial-gradient(120% 90% at 8% 108%, #0f2e34 0%, rgba(15,46,52,0) 48%),\n      radial-gradient(100% 70% at 50% 50%, #0e1120 0%, var(--void) 70%),\n      var(--void);\n  }\n  /* slow arcane aurora sweeping across the top */\n  .aurora{position:absolute;inset:-20% -10% auto -10%;height:70%;\n    background:\n      radial-gradient(60% 100% at 20% 0%, rgba(124,92,196,.20), transparent 60%),\n      radial-gradient(60% 100% at 60% 10%, rgba(86,162,156,.18), transparent 60%),\n      radial-gradient(55% 100% at 88% 0%, rgba(199,123,88,.16), transparent 62%);\n    filter:blur(28px);mix-blend-mode:screen;\n    animation:aurora 26s ease-in-out infinite alternate;}\n  @keyframes aurora{\n    0%{transform:translateX(-6%) translateY(-4%) scale(1.05);opacity:.75;}\n    50%{transform:translateX(4%) translateY(2%) scale(1.15);opacity:1;}\n    100%{transform:translateX(8%) translateY(-2%) scale(1.08);opacity:.7;}\n  }\n  /* drifting nebula clouds (arcane fog) */\n  .nebula{position:absolute;border-radius:50%;filter:blur(46px);\n    mix-blend-mode:screen;opacity:.55;will-change:transform;}\n  .nebula.n1{width:48vmax;height:48vmax;left:-12vmax;top:18%;\n    background:radial-gradient(circle,rgba(110,80,180,.40),rgba(110,80,180,0) 66%);\n    animation:drift1 34s ease-in-out infinite alternate;}\n  .nebula.n2{width:42vmax;height:42vmax;right:-10vmax;top:34%;\n    background:radial-gradient(circle,rgba(70,150,150,.38),rgba(70,150,150,0) 66%);\n    animation:drift2 40s ease-in-out infinite alternate;}\n  .nebula.n3{width:36vmax;height:36vmax;left:30%;bottom:-16vmax;\n    background:radial-gradient(circle,rgba(199,123,88,.30),rgba(199,123,88,0) 64%);\n    animation:drift3 30s ease-in-out infinite alternate;}\n  @keyframes drift1{0%{transform:translate(0,0) scale(1);}100%{transform:translate(8vmax,-4vmax) scale(1.15);}}\n  @keyframes drift2{0%{transform:translate(0,0) scale(1.1);}100%{transform:translate(-7vmax,5vmax) scale(.95);}}\n  @keyframes drift3{0%{transform:translate(0,0) scale(1);}100%{transform:translate(-5vmax,-6vmax) scale(1.2);}}\n  /* layered starfields (box-shadow speckles) */\n  .stars{position:absolute;inset:0;}\n  .stars i{position:absolute;width:2px;height:2px;background:transparent;}\n  .stars i.a{box-shadow:var(--field-a);}\n  .stars i.b{box-shadow:var(--field-b);opacity:.7;animation:pulse 5s ease-in-out infinite;}\n  .stars i.c{box-shadow:var(--field-c);opacity:.5;animation:pulse 7s ease-in-out infinite reverse;}\n  @keyframes pulse{0%,100%{opacity:.4;}50%{opacity:.85;}}\n  /* twinkling arcane stars (JS-placed) */\n  .twinkle{position:absolute;inset:0;}\n  .twinkle b{position:absolute;width:3px;height:3px;border-radius:50%;\n    background:#fff;animation:tw var(--d,3s) ease-in-out infinite;opacity:0;}\n  @keyframes tw{0%,100%{opacity:0;transform:scale(.6);}\n    50%{opacity:var(--o,.9);transform:scale(1);}}\n  /* big soft drifting orbs (glowing spirits) */\n  .orbs{position:absolute;inset:0;}\n  .orb{position:absolute;border-radius:50%;filter:blur(1px);\n    animation:float var(--d,18s) ease-in-out infinite;opacity:.0;will-change:transform;}\n  @keyframes float{\n    0%{transform:translate(0,0);opacity:0;}\n    20%{opacity:var(--o,.5);}\n    80%{opacity:var(--o,.4);}\n    100%{transform:translate(var(--dx,20px),var(--dy,-50px));opacity:0;}\n  }\n  /* floating motes / embers */\n  .motes{position:absolute;inset:0;}\n  /* live particle canvas (drifting dust + shooting stars) */\n  .fx{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}\n  .mote{position:absolute;width:3px;height:3px;background:var(--gold);\n    box-shadow:0 0 6px 1px rgba(214,201,122,.6);opacity:.0;\n    animation:rise linear infinite;}\n  @keyframes rise{\n    0%{transform:translateY(20px) translateX(0);opacity:0;}\n    12%{opacity:.85;}\n    50%{transform:translateY(-30vh) translateX(var(--sway,8px));}\n    88%{opacity:.5;}\n    100%{transform:translateY(-72vh) translateX(0);opacity:0;}\n  }\n  /* central pulsing magic aura behind the hero */\n  .aura{position:absolute;left:30%;top:52%;width:42vmax;height:42vmax;\n    transform:translate(-50%,-50%);pointer-events:none;\n    background:radial-gradient(circle,rgba(199,123,88,.16),rgba(186,145,88,.06) 38%,transparent 64%);\n    mix-blend-mode:screen;animation:breathe 8s ease-in-out infinite;}\n  @keyframes breathe{0%,100%{opacity:.6;transform:translate(-50%,-50%) scale(1);}\n    50%{opacity:1;transform:translate(-50%,-50%) scale(1.12);}}\n  /* faint vignette + scanlines */\n  .grain{position:fixed;inset:0;z-index:5;pointer-events:none;\n    background:repeating-linear-gradient(0deg,rgba(0,0,0,0) 0px,rgba(0,0,0,0) 2px,rgba(0,0,0,.10) 3px,rgba(0,0,0,0) 4px);\n    mix-blend-mode:multiply;opacity:.5;}\n  .vignette{position:fixed;inset:0;z-index:4;pointer-events:none;\n    box-shadow:inset 0 0 min(28vmin,260px) min(8vmin,90px) rgba(6,7,12,.92);}\n\n  /* ===== Shell (no-scroll viewport) ===== */\n  .shell{position:relative;z-index:6;height:100dvh;width:100%;\n    display:flex;flex-direction:column;\n    padding:clamp(14px,2.4vmin,30px) clamp(16px,3.2vw,56px);\n    gap:clamp(10px,1.6vmin,20px);}\n\n  /* ===== Top bar ===== */\n  header{flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;gap:16px;}\n  .brand{display:flex;align-items:center;gap:clamp(8px,1vw,14px);}\n  .brand .mark{width:clamp(26px,3.4vmin,38px);height:clamp(26px,3.4vmin,38px);\n    display:grid;place-items:center;\n    background:linear-gradient(180deg,#241c12,#15110b);\n    border:2px solid var(--bronze-deep);\n    box-shadow:inset 0 0 0 2px #0c0a07, 0 0 14px rgba(186,145,88,.25);}\n  .brand .mark img{width:78%;height:78%;}\n  .brand b{font-family:var(--font-micro);font-size:clamp(9px,1.05vmin,12px);\n    color:var(--parchment);letter-spacing:.04em;line-height:1.4;}\n  .brand b span{color:var(--bronze);}\n  .ghlink{font-family:var(--font-micro);font-size:clamp(7px,.88vmin,10px);\n    color:var(--muted);text-decoration:none;letter-spacing:.04em;\n    display:flex;align-items:center;gap:8px;padding:8px 12px;\n    border:1px solid #23283a;background:rgba(16,19,28,.6);\n    transition:.18s;}\n  .ghlink:hover{color:var(--parchment);border-color:var(--bronze-deep);\n    box-shadow:0 0 14px rgba(186,145,88,.2);}\n  .ghlink svg{width:14px;height:14px;fill:currentColor;}\n\n  /* ===== Main: hero (left) + gallery (right) ===== */\n  main{flex:1 1 auto;min-height:0;display:grid;\n    grid-template-columns:minmax(0,1fr) minmax(0,1.06fr);\n    align-items:center;gap:clamp(20px,3.4vw,60px);}\n\n  /* ----- Hero copy ----- */\n  .hero{display:flex;flex-direction:column;min-width:0;\n    gap:clamp(12px,1.9vmin,22px);}\n  .kicker{font-family:var(--font-micro);font-size:clamp(7px,.92vmin,10px);\n    letter-spacing:.16em;display:flex;flex-direction:column;gap:8px;line-height:1.5;}\n  .kicker .kline{display:flex;align-items:center;gap:10px;color:var(--sage);}\n  .kicker .kline2{color:var(--muted);letter-spacing:.22em;padding-left:36px;}\n  .kicker .rune{color:var(--bronze);}\n  .kicker hr{flex:0 0 26px;border:none;border-top:2px solid var(--bronze-deep);}\n\n  h1{font-family:var(--font-pixel);font-weight:700;\n    font-size:clamp(40px,8.4vmin,98px);line-height:.92;\n    letter-spacing:.01em;color:var(--parchment);\n    text-shadow:0 0 1px #000, 4px 4px 0 #0a0b12,\n      0 0 26px rgba(199,123,88,.32), 0 0 60px rgba(186,145,88,.18);}\n  h1 .b{color:var(--copper);\n    text-shadow:0 0 1px #000, 4px 4px 0 #0a0b12,\n      0 0 30px rgba(199,123,88,.55);}\n\n  .tagline{font-size:clamp(18px,2.5vmin,30px);line-height:1.2;\n    color:var(--parchment);max-width:34ch;text-wrap:balance;}\n  .tagline em{color:var(--gold-bright);font-style:normal;}\n\n  .sprites{display:flex;align-items:flex-end;gap:clamp(10px,1.4vw,20px);\n    flex-wrap:wrap;}\n  .pedestal{display:flex;flex-direction:column;align-items:center;gap:6px;}\n  .tile{width:clamp(44px,6.2vmin,64px);height:clamp(44px,6.2vmin,64px);\n    display:grid;place-items:center;\n    background:linear-gradient(180deg,var(--pedestal),var(--pedestal-face));\n    border:2px solid #0c0e16;\n    box-shadow:inset 0 2px 0 rgba(120,130,160,.18),\n      0 4px 0 var(--shadow), 0 6px 12px rgba(0,0,0,.45);}\n  .tile img{width:74%;height:74%;animation:bob 3.4s ease-in-out infinite;}\n  .pedestal:nth-child(2) .tile img{animation-delay:.4s;}\n  .pedestal:nth-child(3) .tile img{animation-delay:.8s;}\n  .pedestal:nth-child(4) .tile img{animation-delay:1.2s;}\n  @keyframes bob{0%,100%{transform:translateY(0);}50%{transform:translateY(-3px);}}\n  .pedestal span{font-family:var(--font-micro);font-size:clamp(6px,.72vmin,8px);\n    color:var(--muted);letter-spacing:.08em;}\n  .plus{font-size:clamp(22px,3vmin,34px);color:var(--bronze);\n    align-self:center;margin-bottom:18px;}\n\n  /* ----- Install command ----- */\n  .install{display:flex;flex-direction:column;gap:8px;max-width:560px;}\n  .install .lbl{font-family:var(--font-micro);font-size:clamp(6px,.74vmin,9px);\n    color:var(--muted);letter-spacing:.12em;}\n  .install .lbl b{color:var(--sage);}\n  .cmd{display:flex;align-items:stretch;gap:0;\n    background:#0b0d14;border:2px solid var(--bronze-deep);\n    box-shadow:0 0 0 2px #0c0a07, 0 0 26px rgba(186,145,88,.18),\n      inset 0 0 30px rgba(0,0,0,.55);\n    position:relative;overflow:hidden;cursor:pointer;}\n  .cmd::before{content:\"\";position:absolute;inset:0;pointer-events:none;\n    background:linear-gradient(90deg,rgba(199,123,88,.05),transparent 30%);}\n  .cmd .code{flex:1 1 auto;min-width:0;display:flex;align-items:center;\n    gap:.5ch;padding:clamp(10px,1.5vmin,16px) clamp(12px,1.6vmin,18px);\n    font-family:var(--font-term);font-size:clamp(15px,2vmin,24px);\n    color:var(--parchment);white-space:nowrap;overflow:hidden;\n    text-overflow:ellipsis;}\n  .cmd .code .pr{color:var(--copper);}\n  .cmd .code .url{color:var(--gold-bright);}\n  .cmd .code .pipe{color:var(--muted);}\n  .cmd button{flex:0 0 auto;border:none;border-left:2px solid var(--bronze-deep);\n    background:linear-gradient(180deg,#241c12,#15110b);color:var(--bronze);\n    font-family:var(--font-micro);font-size:clamp(7px,.86vmin,10px);\n    letter-spacing:.06em;padding:0 clamp(12px,1.5vw,20px);cursor:pointer;\n    display:flex;align-items:center;gap:8px;transition:.16s;white-space:nowrap;}\n  .cmd button:hover{color:var(--parchment);\n    background:linear-gradient(180deg,#2f2415,#1a140c);}\n  .cmd button svg{width:13px;height:13px;fill:currentColor;}\n  .cmd button.ok{color:var(--sage);}\n  .blink{animation:blink 1.1s step-end infinite;color:var(--copper);}\n  @keyframes blink{50%{opacity:0;}}\n  .subline{font-size:clamp(14px,1.7vmin,20px);color:var(--muted);}\n  .subline b{color:var(--gold);}\n\n  /* ----- Screenshot gallery ----- */\n  .gallery{position:relative;height:100%;min-height:0;\n    display:flex;align-items:center;justify-content:center;}\n  .stage{position:relative;width:100%;max-width:min(46vw,820px);\n    aspect-ratio:800/512;}\n  .shot{position:absolute;overflow:hidden;\n    border:2px solid #0a0b12;\n    box-shadow:0 0 0 2px var(--bronze-deep), 0 18px 40px rgba(0,0,0,.6);\n    background:var(--void);}\n  .shot img{display:block;width:100%;height:100%;object-fit:cover;}\n  .shot .cap{position:absolute;left:0;bottom:0;\n    font-family:var(--font-micro);font-size:8px;color:var(--parchment);\n    background:rgba(8,9,15,.82);border-top:2px solid var(--bronze-deep);\n    border-right:2px solid var(--bronze-deep);\n    padding:5px 9px;letter-spacing:.05em;}\n  /* fanned arrangement */\n  .shot.back-1{width:62%;top:2%;left:0;transform:rotate(-5deg);z-index:1;\n    filter:brightness(.82) saturate(.9);}\n  .shot.back-2{width:60%;top:6%;right:0;transform:rotate(5deg);z-index:1;\n    filter:brightness(.82) saturate(.9);}\n  .shot.front{width:78%;left:50%;top:50%;transform:translate(-50%,-46%);\n    z-index:3;box-shadow:0 0 0 2px var(--bronze), 0 0 40px rgba(186,145,88,.22),\n      0 26px 54px rgba(0,0,0,.7);}\n  .shot.front::after{content:\"\";position:absolute;inset:0;pointer-events:none;\n    box-shadow:inset 0 0 0 1px rgba(214,201,165,.12);}\n  .glow-ring{position:absolute;left:50%;top:50%;\n    width:84%;aspect-ratio:1;transform:translate(-50%,-50%);\n    background:radial-gradient(circle,rgba(199,123,88,.16),transparent 62%);\n    z-index:0;filter:blur(8px);}\n\n  /* ===== Footer ===== */\n  footer{flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;\n    gap:14px;font-family:var(--font-micro);font-size:clamp(6px,.74vmin,9px);\n    color:var(--muted);letter-spacing:.06em;\n    border-top:1px solid #1a1e2c;padding-top:clamp(8px,1.2vmin,14px);}\n  footer .l{display:flex;align-items:center;gap:clamp(10px,1.4vw,20px);flex-wrap:wrap;}\n  footer .dot{color:var(--bronze-deep);}\n  footer a{color:var(--muted);text-decoration:none;transition:.16s;}\n  footer a:hover{color:var(--sage);}\n  footer .ver{color:var(--bronze);}\n\n  /* ===== Responsive ===== */\n  @media (max-width:900px){\n    main{grid-template-columns:1fr;grid-template-rows:auto auto;\n      gap:clamp(14px,3vmin,28px);align-content:center;}\n    .gallery{order:2;}\n    .hero{order:1;align-items:flex-start;}\n    .stage{max-width:min(72vw,420px);}\n    .tagline{max-width:38ch;}\n  }\n  @media (max-width:560px){\n    .shell{padding:14px 16px;gap:10px;}\n    .brand b{font-size:8px;}\n    h1{font-size:clamp(34px,12vw,56px);}\n    .tagline{font-size:clamp(16px,4.6vw,22px);}\n    .sprites .pedestal:nth-child(n+5){display:none;}\n    .stage{max-width:min(80vw,360px);}\n    .shot.back-1{left:-4%;}.shot.back-2{right:-4%;}\n    .cmd .code{font-size:clamp(13px,4.2vw,18px);}\n    .ghlink span{display:none;}\n    footer .ver{display:none;}\n  }\n  /* short / landscape phones */\n  @media (max-height:520px) and (min-width:901px){\n    .sprites{display:none;}\n  }\n  @media (max-height:600px) and (max-width:900px){\n    .gallery{display:none;}\n    main{grid-template-rows:1fr;}\n    .hero{justify-content:center;}\n  }\n  @media (prefers-reduced-motion:reduce){\n    .mote,.tile img,.blink,.aurora,.nebula,.orb,.aura,.stars i,.twinkle b{animation:none;}\n    .orb,.mote{opacity:.35!important;}\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n  \n  <div class=\"sky\">\n    <div class=\"aurora\"><\u002Fdiv>\n    <div class=\"nebula n1\"><\u002Fdiv>\n    <div class=\"nebula n2\"><\u002Fdiv>\n    <div class=\"nebula n3\"><\u002Fdiv>\n    <div class=\"stars\"><i class=\"a\"><\u002Fi><i class=\"b\"><\u002Fi><i class=\"c\"><\u002Fi><\u002Fdiv>\n    <div class=\"twinkle\" id=\"twinkle\"><\u002Fdiv>\n    <div class=\"orbs\" id=\"orbs\"><\u002Fdiv>\n    <canvas class=\"fx\" id=\"fx\"><\u002Fcanvas>\n    <div class=\"motes\" id=\"motes\"><\u002Fdiv>\n    <div class=\"aura\"><\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"vignette\"><\u002Fdiv>\n  <div class=\"grain\"><\u002Fdiv>\n\n  <div class=\"shell\">\n    <!-- top bar -->\n    <header>\n      <div class=\"brand\">\n        <div class=\"mark\"><img src=\"4d0b7d41-78e1-453f-8067-4e20281b3b97\" alt=\"\"><\u002Fdiv>\n        <b>ALCHEMY <span>TUI<\u002Fspan><\u002Fb>\n      <\u002Fdiv>\n      <a class=\"ghlink\" href=\"https://github.com/kmelct/tui-alchemy\" target=\"_blank\" rel=\"noopener\">\n        <svg viewBox=\"0 0 16 16\" aria-hidden=\"true\"><path d=\"M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z\"><\u002Fpath><\u002Fsvg>\n        <span>GITHUB<\u002Fspan>\n      <\u002Fa>\n    <\u002Fheader>\n\n    <!-- hero + gallery -->\n    <main>\n      <section class=\"hero\">\n        <div class=\"kicker\">\n          <span class=\"kline\"><hr><span class=\"rune\">✦<\u002Fspan> TERMINAL ALCHEMY<\u002Fspan>\n          <span class=\"kline kline2\">PIXEL-ART CRAFTING GAME<\u002Fspan>\n        <\u002Fdiv>\n        <h1>ALCHEMY<br><span class=\"b\">TUI<\u002Fspan><\u002Fh1>\n        <p class=\"tagline\">Combine four classical elements into a <em>755-element<\u002Fem> recipe book — right in your terminal.<\u002Fp>\n\n        <div class=\"sprites\">\n          <div class=\"pedestal\"><div class=\"tile\"><img src=\"7980af9e-f734-4662-a21c-76f7730d070d\" alt=\"Air\"><\u002Fdiv><span>AIR<\u002Fspan><\u002Fdiv>\n          <div class=\"pedestal\"><div class=\"tile\"><img src=\"accb69c1-c90c-4824-b3a0-f64c8158fcd2\" alt=\"Earth\"><\u002Fdiv><span>EARTH<\u002Fspan><\u002Fdiv>\n          <div class=\"pedestal\"><div class=\"tile\"><img src=\"fed9ee5a-344c-429b-befd-05654f943cf0\" alt=\"Fire\"><\u002Fdiv><span>FIRE<\u002Fspan><\u002Fdiv>\n          <div class=\"pedestal\"><div class=\"tile\"><img src=\"b6b99069-1dfd-4f52-960e-9355a9923b48\" alt=\"Water\"><\u002Fdiv><span>WATER<\u002Fspan><\u002Fdiv>\n          <div class=\"plus\">⇒<\u002Fdiv>\n          <div class=\"pedestal\"><div class=\"tile\" style=\"border-color:var(--bronze-deep);box-shadow:inset 0 2px 0 rgba(214,201,165,.2),0 4px 0 var(--shadow),0 0 22px rgba(186,145,88,.3);\"><img src=\"ba4e96bb-7a2c-47d1-89ca-556ca4d141ae\" alt=\"Steam\"><\u002Fdiv><span style=\"color:var(--gold);\">STEAM<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"install\">\n          <div class=\"lbl\"><b>INSTALL<\u002Fb> · ONE COMMAND<\u002Fdiv>\n          <div class=\"cmd\" id=\"cmd\" title=\"Click to copy\">\n            <div class=\"code\"><span class=\"pr\">$<\u002Fspan>&nbsp;curl -fsSL <span class=\"url\">https://tui-alchemy.sh<\u002Fspan> <span class=\"pipe\">|<\u002Fspan> sh<\u002Fdiv>\n            <button id=\"copyBtn\" aria-label=\"Copy install command\">\n              <svg viewBox=\"0 0 16 16\" aria-hidden=\"true\"><path d=\"M10 1H4a2 2 0 00-2 2v8h2V3h6V1zm3 3H7a2 2 0 00-2 2v8a2 2 0 002 2h6a2 2 0 002-2V6a2 2 0 00-2-2zm0 10H7V6h6v8z\"><\u002Fpath><\u002Fsvg>\n              <span id=\"copyTxt\">COPY<\u002Fspan>\n            <\u002Fbutton>\n          <\u002Fdiv>\n          <div class=\"subline\">Then run <b>tui-alchemy<\u002Fb> · press <b>q<\u002Fb> to quit · MIT licensed<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <section class=\"gallery\">\n        <div class=\"stage\">\n          <div class=\"glow-ring\"><\u002Fdiv>\n          <figure class=\"shot back-1\">\n            <img src=\"5cfa1974-d141-4b87-9138-6fbb99f261e6\" alt=\"Fresh game with the four starter elements\">\n            <figcaption class=\"cap\">START<\u002Ffigcaption>\n          <\u002Ffigure>\n          <figure class=\"shot back-2\">\n            <img src=\"b50cf1ce-2360-4b40-9cd5-7381f2b13df5\" alt=\"Water and Fire combine into Steam\">\n            <figcaption class=\"cap\">DISCOVER<\u002Ffigcaption>\n          <\u002Ffigure>\n          <figure class=\"shot front\">\n            <img src=\"6c68549c-b2de-4e56-9515-220f978a93bd\" alt=\"A populated atlas of discovered elements\">\n            <figcaption class=\"cap\">28 / 755 DISCOVERED<\u002Ffigcaption>\n          <\u002Ffigure>\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fmain>\n\n    <!-- footer -->\n    <footer>\n      <div class=\"l\">\n        <span class=\"ver\">v0.1.0<\u002Fspan>\n        <span class=\"dot\">◆<\u002Fspan>\n        <span>MIT LICENSE<\u002Fspan>\n        <span class=\"dot\">◆<\u002Fspan>\n        <a href=\"https://github.com/kmelct/tui-alchemy\" target=\"_blank\" rel=\"noopener\">GITHUB.COM/KMELCT/TUI-ALCHEMY<\u002Fa>\n      <\u002Fdiv>\n      <div>BUILT WITH RUST · RATATUI<\u002Fdiv>\n    <\u002Ffooter>\n  <\u002Fdiv>\n\n<script>\n  // ---- starfield generation (box-shadow speckles) ----\n  (function(){\n    const W = 2000, H = 1200;\n    function field(n, colors){\n      let out=[];\n      for(let i=0;i<n;i++){\n        const x=Math.floor(Math.random()*W), y=Math.floor(Math.random()*H);\n        const c=colors[Math.floor(Math.random()*colors.length)];\n        out.push(`${x}px ${y}px ${c}`);\n      }\n      return out.join(',');\n    }\n    const root=document.documentElement.style;\n    root.setProperty('--field-a', field(90, ['#383e58','#2b3147']));\n    root.setProperty('--field-b', field(70, ['#1c1f2e','#23283a']));\n    root.setProperty('--field-c', field(50, ['#4a5170','#5b6386']));\n\n    // floating motes / embers\n    const m=document.getElementById('motes');\n    const small = window.innerWidth < 600;\n    const N = small ? 16 : 34;\n    const emberCols=['var(--gold)','var(--copper)','var(--gold-bright)','#8caba1','#9a7cc4'];\n    for(let i=0;i<N;i++){\n      const d=document.createElement('div');d.className='mote';\n      const col=emberCols[Math.floor(Math.random()*emberCols.length)];\n      d.style.left=(Math.random()*100)+'%';\n      d.style.top=(Math.random()*100)+'%';\n      d.style.animationDuration=(7+Math.random()*9)+'s';\n      d.style.animationDelay=(-Math.random()*14)+'s';\n      const s=1+Math.random()*2.4; d.style.width=s+'px';d.style.height=s+'px';\n      d.style.background=col;\n      d.style.boxShadow='0 0 7px 1px '+col;\n      d.style.setProperty('--sway',(Math.random()*24-12)+'px');\n      m.appendChild(d);\n    }\n\n    // twinkling arcane stars\n    const tw=document.getElementById('twinkle');\n    const TW = small ? 26 : 56;\n    const twCols=['#fff','#cfe3ff','#e8d9ff','#d6c97a'];\n    for(let i=0;i<TW;i++){\n      const b=document.createElement('b');\n      b.style.left=(Math.random()*100)+'%';\n      b.style.top=(Math.random()*92)+'%';\n      const c=twCols[Math.floor(Math.random()*twCols.length)];\n      b.style.background=c;\n      b.style.boxShadow='0 0 5px 1px '+c;\n      const sz=1.5+Math.random()*2.5; b.style.width=sz+'px';b.style.height=sz+'px';\n      b.style.setProperty('--d',(2.4+Math.random()*4.5)+'s');\n      b.style.setProperty('--o',(0.55+Math.random()*0.45).toFixed(2));\n      b.style.animationDelay=(-Math.random()*6)+'s';\n      tw.appendChild(b);\n    }\n\n    // big soft drifting glow-orbs (spirits)\n    const orbs=document.getElementById('orbs');\n    const orbDefs=[\n      ['rgba(140,171,161,.55)','rgba(140,171,161,0)'],   // sage\n      ['rgba(154,124,196,.55)','rgba(154,124,196,0)'],   // violet\n      ['rgba(199,123,88,.55)','rgba(199,123,88,0)'],     // copper\n      ['rgba(214,201,122,.50)','rgba(214,201,122,0)'],   // gold\n      ['rgba(86,162,156,.50)','rgba(86,162,156,0)']      // teal\n    ];\n    const ON = small ? 5 : 9;\n    for(let i=0;i<ON;i++){\n      const o=document.createElement('div');o.className='orb';\n      const def=orbDefs[i%orbDefs.length];\n      const sz=14+Math.random()*40;\n      o.style.width=sz+'px';o.style.height=sz+'px';\n      o.style.left=(Math.random()*100)+'%';\n      o.style.top=(60+Math.random()*40)+'%';\n      o.style.background='radial-gradient(circle,'+def[0]+','+def[1]+' 70%)';\n      o.style.boxShadow='0 0 '+(sz*0.8)+'px '+(sz*0.3)+'px '+def[0];\n      o.style.setProperty('--d',(14+Math.random()*16)+'s');\n      o.style.setProperty('--o',(0.3+Math.random()*0.35).toFixed(2));\n      o.style.setProperty('--dx',(Math.random()*120-60)+'px');\n      o.style.setProperty('--dy',(-180-Math.random()*220)+'px');\n      o.style.animationDelay=(-Math.random()*20)+'s';\n      orbs.appendChild(o);\n    }\n  })();\n\n  // ---- live particle canvas: drifting arcane dust + shooting stars ----\n  (function(){\n    const reduce = window.matchMedia('(prefers-reduced-motion:reduce)').matches;\n    const cv=document.getElementById('fx');\n    if(!cv) return;\n    const ctx=cv.getContext('2d');\n    let W=0,H=0,DPR=Math.min(window.devicePixelRatio||1,2);\n    const PAL=[ [214,201,122], [199,123,88], [140,171,161], [154,124,196], [86,162,156], [210,201,165] ];\n    let dust=[], shots=[];\n\n    function resize(){\n      W=cv.clientWidth;H=cv.clientHeight;\n      cv.width=W*DPR;cv.height=H*DPR;\n      ctx.setTransform(DPR,0,0,DPR,0,0);\n      const small=W<600;\n      const n=small?46:Math.round(W*H/16000);\n      dust=[];\n      for(let i=0;i<n;i++) dust.push(spawn());\n    }\n    function spawn(){\n      const c=PAL[(Math.random()*PAL.length)|0];\n      const depth=Math.random();           // 0 far .. 1 near (parallax)\n      return {\n        x:Math.random()*W, y:Math.random()*H,\n        r:(0.7+depth*2.4),\n        vx:(Math.random()*2-1)*(0.12+depth*0.4),\n        vy:(-0.14-depth*0.42-Math.random()*0.14),\n        c, base:0.28+depth*0.58,\n        tw:Math.random()*Math.PI*2, ts:0.8+Math.random()*1.8\n      };\n    }\n    function shoot(){\n      // a streak from upper area, diagonal\n      const fromLeft=Math.random()<0.5;\n      const y=Math.random()*H*0.55;\n      shots.push({\n        x:fromLeft?-40:W+40, y,\n        vx:(fromLeft?1:-1)*(8+Math.random()*6),\n        vy:(1.8+Math.random()*2.0),\n        life:0, max:60+Math.random()*30,\n        c:PAL[(Math.random()*3)|0], len:110+Math.random()*90\n      });\n    }\n\n    let last=performance.now(), acc=0, t=0;\n    function frame(now){\n      const dt=Math.min(40, now-last); last=now; t+=dt*0.001;\n      ctx.clearRect(0,0,W,H);\n      ctx.globalCompositeOperation='lighter';\n      // drifting dust\n      for(const p of dust){\n        p.x+=p.vx; p.y+=p.vy; p.tw+=0.02*p.ts;\n        if(p.y<-10){p.y=H+10;p.x=Math.random()*W;}\n        if(p.x<-10)p.x=W+10; else if(p.x>W+10)p.x=-10;\n        const a=p.base*(0.55+0.45*Math.sin(p.tw));\n        const g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r*4);\n        g.addColorStop(0,`rgba(${p.c[0]},${p.c[1]},${p.c[2]},${a})`);\n        g.addColorStop(1,`rgba(${p.c[0]},${p.c[1]},${p.c[2]},0)`);\n        ctx.fillStyle=g;\n        ctx.beginPath();ctx.arc(p.x,p.y,p.r*4,0,7);ctx.fill();\n      }\n      // shooting stars\n      acc+=dt;\n      if(acc>1400+Math.random()*2000){acc=0; if(!reduce) shoot();}\n      for(let i=shots.length-1;i>=0;i--){\n        const s=shots[i]; s.life+=1; s.x+=s.vx; s.y+=s.vy;\n        const k=Math.sin(Math.PI*Math.min(1,s.life/s.max));\n        const tx=s.x-(s.vx/Math.hypot(s.vx,s.vy))*s.len;\n        const ty=s.y-(s.vy/Math.hypot(s.vx,s.vy))*s.len;\n        const grad=ctx.createLinearGradient(s.x,s.y,tx,ty);\n        grad.addColorStop(0,`rgba(${s.c[0]},${s.c[1]},${s.c[2]},${0.9*k})`);\n        grad.addColorStop(1,`rgba(${s.c[0]},${s.c[1]},${s.c[2]},0)`);\n        ctx.strokeStyle=grad;ctx.lineWidth=2;ctx.lineCap='round';\n        ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.lineTo(tx,ty);ctx.stroke();\n        // head\n        ctx.fillStyle=`rgba(255,250,235,${0.95*k})`;\n        ctx.beginPath();ctx.arc(s.x,s.y,1.8,0,7);ctx.fill();\n        if(s.life>s.max||s.x<-80||s.x>W+80||s.y>H+80) shots.splice(i,1);\n      }\n      ctx.globalCompositeOperation='source-over';\n      requestAnimationFrame(frame);\n    }\n    resize();\n    window.addEventListener('resize',resize,{passive:true});\n    if(reduce){\n      // static frame: draw dust once\n      for(const p of dust){\n        ctx.globalCompositeOperation='lighter';\n        const g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r*4);\n        g.addColorStop(0,`rgba(${p.c[0]},${p.c[1]},${p.c[2]},${p.base})`);\n        g.addColorStop(1,`rgba(${p.c[0]},${p.c[1]},${p.c[2]},0)`);\n        ctx.fillStyle=g;ctx.beginPath();ctx.arc(p.x,p.y,p.r*4,0,7);ctx.fill();\n      }\n    } else {\n      requestAnimationFrame(frame);\n    }\n  })();\n\n  // ---- copy install command ----\n  (function(){\n    const CMD = 'curl -fsSL https://tui-alchemy.sh | sh';\n    const box=document.getElementById('cmd');\n    const btn=document.getElementById('copyBtn');\n    const txt=document.getElementById('copyTxt');\n    let t=null;\n    function copy(){\n      navigator.clipboard?.writeText(CMD).catch(()=>{});\n      btn.classList.add('ok'); txt.textContent='COPIED!';\n      clearTimeout(t);\n      t=setTimeout(()=>{btn.classList.remove('ok');txt.textContent='COPY';},1600);\n    }\n    box.addEventListener('click',(e)=>{e.preventDefault();copy();});\n  })();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
