name: Deploy website

on:
   push:
      branches:
         - master
      paths:
         - Cargo.lock
         - Cargo.toml
         - assets/**
         - data/**
         - scripts/build-website.sh
         - scripts/install-tui-alchemy.ps1
         - scripts/install-tui-alchemy.sh
         - scripts/test-website.mjs
         - src/**
         - website/**
         - wrangler.toml
         - .github/workflows/deploy-website.yml
   workflow_dispatch:

permissions:
   contents: read

concurrency:
   group: website-${{ github.ref }}
   cancel-in-progress: true

env:
   CLOUDFLARE_PAGES_ACCOUNT_ID: e9c375806f33a6c2a42c7d5ca9729105
   CLOUDFLARE_R2_ACCOUNT_ID: 279a8319536bf8f797e9d25954fe445c
   CLOUDFLARE_PAGES_PROJECT: tui-alchemy
   CLOUDFLARE_PAGES_BRANCH: master
   CLOUDFLARE_R2_BUCKET: tui-alchemy-assets

jobs:
   deploy:
      runs-on: ubuntu-latest
      steps:
         - uses: actions/checkout@v4

         - uses: dtolnay/rust-toolchain@stable
         - name: Add WebAssembly target
           run: rustup target add wasm32-unknown-unknown

         - name: Test
           run: cargo test

         - name: Package crate artifact
           run: cargo package

         - name: Build website
           run: scripts/build-website.sh

         - name: Package current-platform binary
           run: node scripts/package-current-binary.mjs

         - name: Test website
           run: node scripts/test-website.mjs

         - name: Upload installer assets to R2
           env:
              CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
              CLOUDFLARE_R2_ACCOUNT_ID: ${{ env.CLOUDFLARE_R2_ACCOUNT_ID }}
           run: node scripts/upload-r2-assets.mjs

         - name: Deploy Cloudflare Pages
           env:
              CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
              CLOUDFLARE_ACCOUNT_ID: ${{ env.CLOUDFLARE_PAGES_ACCOUNT_ID }}
           run: |
              npx wrangler@latest pages deploy website/dist \
                --project-name "$CLOUDFLARE_PAGES_PROJECT" \
                --branch "$CLOUDFLARE_PAGES_BRANCH"
